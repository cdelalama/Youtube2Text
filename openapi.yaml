openapi: 3.1.0
info:
  title: Media2Text API
  version: 0.38.0
  description: |
    Minimal local HTTP API for Media2Text, backed by the youtube2text engine.
    Notes:
    - CLI remains the primary workflow; API/Web are shells around the same core.
    - SSE endpoints are documented as text/event-stream.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: http://127.0.0.1:8787
security:
  - ApiKeyAuth: []
paths:
  /status/media-pipeline:
    get:
      operationId: getMediaPipelineStatus
      summary: Get sanitized Home Infra media-pipeline status
      security: []
      responses:
        "200":
          description: Current sanitized producer snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusSnapshot"
        "429":
          $ref: "#/components/responses/RateLimited"

  /v1/intakes:
    post:
      operationId: createMediaIntake
      summary: Durably accept an external media processing obligation
      description: |
        Returns 202 only after the idempotent obligation is committed. Artifact
        download, integrity verification, and transcription happen asynchronously.
      security:
        - IntakeKeyAuth: []
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MediaIntakeRequestV1"
      responses:
        "202":
          description: Obligation persisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaIntakeAcceptedResponse"
        "400":
          description: Invalid contract payload
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "409":
          description: Idempotency identity conflicts with a different request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
    get:
      operationId: listMediaIntakes
      summary: List media intake jobs
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      responses:
        "200":
          description: Intake jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaIntakeListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /v1/intakes/{intakeId}:
    get:
      operationId: getMediaIntake
      summary: Get a media intake job
      parameters:
        - $ref: "#/components/parameters/IntakeId"
      responses:
        "200":
          description: Intake job
          content:
            application/json:
              schema:
                type: object
                required: [intake]
                properties:
                  intake: { $ref: "#/components/schemas/MediaIntakeRecord" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /v1/transcripts:
    get:
      operationId: listTranscriptRecords
      summary: List immutable Transcript Store records
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      responses:
        "200":
          description: Transcript summaries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscriptListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /v1/transcripts/{transcriptId}:
    get:
      operationId: getTranscriptRecord
      summary: Get one immutable Transcript Store record
      parameters:
        - $ref: "#/components/parameters/TranscriptId"
      responses:
        "200":
          description: Immutable transcript record plus record integrity fields
          headers:
            ETag:
              schema: { type: string }
            X-Media2Text-Record-SHA256:
              schema: { type: string, pattern: "^[a-f0-9]{64}$" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscriptRecordV1"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /metrics:
    get:
      operationId: getMetrics
      summary: Get Prometheus metrics
      description: |
        Returns Prometheus exposition format (text/plain; version=0.0.4).
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /metrics/cost:
    get:
      operationId: getUsageCost
      summary: Get estimated transcription usage and cost
      description: |
        Returns the local usage ledger snapshot. Cost is estimated from audio duration
        and operator-configured provider rates; failed reservations remain counted
        because a provider may already have billed the request.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageCostResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /providers:
    get:
      operationId: listProviders
      summary: List transcription provider capabilities
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProvidersListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /maintenance/cleanup:
    post:
      operationId: triggerMaintenanceCleanup
      summary: Trigger retention cleanup (runs + audio cache)
      description: |
        Runs best-effort retention cleanup based on environment configuration.
        Notes:
        - Never deletes transcripts under `output/<channelDir>/...`.
        - Deletes only API run persistence under `output/_runs/*` (if enabled) and old audio cache files under `audio/*`.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CleanupResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"

  /settings:
    get:
      operationId: getSettings
      summary: Get non-secret settings
      description: |
        Returns the current persisted non-secret defaults stored in `output/_settings.json`,
        and the effective config values after applying those settings to the loaded config.
        Notes:
        - Secrets are never returned here (e.g. `ASSEMBLYAI_API_KEY`, `Y2T_API_KEY`).
        - Precedence: `output/_settings.json` (lowest) < `config.yaml` < `.env` (highest).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsGetResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: patchSettings
      summary: Update non-secret settings
      description: |
        Updates persisted non-secret defaults in `output/_settings.json`.
        Send `null` for a key to clear it (remove it from the settings file).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsPatchRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsGetResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"

  /watchlist:
    get:
      operationId: listWatchlist
      summary: List watchlist entries
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: addWatchlistEntry
      summary: Add watchlist entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchlistCreateRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistEntryResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /audio:
    post:
      operationId: uploadAudio
      summary: Upload a local audio file
      description: |
        Uploads a local audio file and returns an `audioId` to use with `POST /runs`.
        The server stores uploads under `audio/_uploads` and metadata under `output/_uploads`.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                title:
                  type: string
                  description: Optional title for the audio run.
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AudioUploadResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "408":
          description: Request timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"

  /watchlist/{id}:
    get:
      operationId: getWatchlistEntry
      summary: Get watchlist entry
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistEntryResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateWatchlistEntry
      summary: Update watchlist entry
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchlistUpdateRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistEntryResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
    delete:
      operationId: removeWatchlistEntry
      summary: Remove watchlist entry
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"

  /scheduler/status:
    get:
      operationId: getSchedulerStatus
      summary: Get scheduler status
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchedulerStatusResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scheduler/start:
    post:
      operationId: startScheduler
      summary: Start scheduler loop (in-process)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchedulerStatusResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"

  /scheduler/stop:
    post:
      operationId: stopScheduler
      summary: Stop scheduler loop (in-process)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchedulerStatusResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"

  /scheduler/trigger:
    post:
      operationId: triggerSchedulerOnce
      summary: Trigger one scheduler check cycle
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchedulerTriggerResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"

  /events:
    get:
      operationId: streamGlobalEvents
      summary: Stream global events (SSE)
      description: |
        Server-Sent Events stream for global run updates. Event names include:
        - run:created
        - run:updated
        Data is JSON: { type, run, timestamp }.
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /health:
    get:
      operationId: getHealth
      summary: Health check
      security: []
      parameters:
        - name: deep
          in: query
          required: false
          schema: { type: boolean }
          description: When true, returns a best-effort deep health check (deps + disk + persistence). Requires X-API-Key unless Y2T_HEALTH_DEEP_PUBLIC=true.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"

  /catalog:
    get:
      operationId: listCatalogs
      summary: List cached catalog summaries
      description: |
        Returns a summary of all cached channel catalogs. No yt-dlp call;
        catalogs are populated as a side effect of POST /runs/plan or POST /runs.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /catalog/{channelId}:
    get:
      operationId: getCatalog
      summary: Get full cached catalog for a channel
      description: |
        Returns the full cached catalog (all videos) for a channel.
        Returns 404 if no catalog has been cached yet for this channelId.
      parameters:
        - name: channelId
          in: path
          required: true
          schema:
            type: string
            maxLength: 128
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogDetailResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /runs:
    get:
      operationId: listRuns
      summary: List runs
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createRun
      summary: Create and start a run
      description: |
        Starts a run. For single-video URLs, the API is cache-first:
        if outputs already exist and `force` is false, the API returns a `done` run immediately (no transcription).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunCreateRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunCreateResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"

  /runs/plan:
    post:
      operationId: planRun
      summary: Plan a run (enumerate + skip counts, no transcription)
      description: |
        Enumerates the input URL and computes how many videos are already processed vs remaining,
        without downloading audio or calling the transcription provider.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunPlanRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunPlanResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"

  /runs/{runId}:
    get:
      operationId: getRun
      summary: Get a run
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunGetResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /runs/{runId}/logs:
    get:
      operationId: getRunLogs
      summary: Get recent run events as JSON (tail)
      description: |
        Returns the most recent buffered run events as JSON.
        This is a convenience endpoint for debugging without SSE; it is not guaranteed to return the full history.
      parameters:
        - $ref: "#/components/parameters/RunId"
        - name: tail
          in: query
          required: false
          schema: { type: integer }
          description: Max events to return (default 200, max 2000).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [run, events]
                properties:
                  run: { $ref: "#/components/schemas/RunRecord" }
                  events:
                    type: array
                    items:
                      type: object
                      required: [id, event]
                      properties:
                        id: { type: integer }
                        event: { $ref: "#/components/schemas/PipelineEvent" }
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /runs/{runId}/cancel:
    post:
      operationId: cancelRun
      summary: Request cancellation of a run
      description: |
        Cooperative cancellation. If the run is running, the pipeline stops starting new work and ends as soon as practical.
        In-flight video work may finish. Queued runs are cancelled immediately.
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunGetResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"

  /runs/{runId}/artifacts:
    get:
      operationId: getRunArtifacts
      summary: Get artifacts produced by a run
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunArtifactsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /runs/{runId}/events:
    get:
      operationId: streamRunEvents
      summary: Stream run events (SSE)
      description: |
        Server-Sent Events stream. Event names include:
        - run:start, run:done, run:cancelled, run:error
        - video:start, video:stage, video:done, video:skip, video:error
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /library/channels:
    get:
      operationId: listLibraryChannels
      summary: List channels from output directory
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /library/channels/{channelDirName}:
    get:
      operationId: getLibraryChannelMeta
      summary: Get channel metadata
      parameters:
        - $ref: "#/components/parameters/ChannelDirName"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelMetaResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteLibraryChannel
      summary: Delete a channel and all its videos
      parameters:
        - $ref: "#/components/parameters/ChannelDirName"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteChannelResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict - an active run targets this channel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /library/channels/{channelDirName}/videos:
    get:
      operationId: listLibraryVideos
      summary: List videos for a channel
      parameters:
        - $ref: "#/components/parameters/ChannelDirName"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideosResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /library/channels/{channelDirName}/videos/{basename}:
    delete:
      operationId: deleteLibraryVideo
      summary: Delete a video and all its files
      parameters:
        - $ref: "#/components/parameters/ChannelDirName"
        - $ref: "#/components/parameters/Basename"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteVideoResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict - an active run targets this channel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /library/channels/{channelDirName}/videos/{basename}/{kind}:
    get:
      operationId: getLibraryVideoArtifact
      summary: Fetch a specific video artifact
      parameters:
        - $ref: "#/components/parameters/ChannelDirName"
        - $ref: "#/components/parameters/Basename"
        - $ref: "#/components/parameters/ArtifactKind"
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        Required for all endpoints except `/health` (configured by server env `Y2T_API_KEY`).
    IntakeKeyAuth:
      type: apiKey
      in: header
      name: X-Media2Text-Intake-Key
      description: Least-privilege service credential accepted only by POST /v1/intakes.
  parameters:
    IntakeId:
      name: intakeId
      in: path
      required: true
      schema:
        type: string
        pattern: "^int_[a-f0-9]{64}$"
    TranscriptId:
      name: transcriptId
      in: path
      required: true
      schema:
        type: string
        pattern: "^trn_[a-f0-9]{64}$"
    RunId:
      name: runId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ChannelDirName:
      name: channelDirName
      in: path
      required: true
      schema:
        type: string
    Basename:
      name: basename
      in: path
      required: true
      schema:
        type: string
    ArtifactKind:
      name: kind
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/ArtifactKind"

  responses:
    RateLimited:
      description: Rate limit exceeded
      headers:
        Retry-After:
          description: Seconds until the rate limit window resets
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    StatusSnapshot:
      type: object
      required: [observed_at, condition, severity, summary]
      additionalProperties: true
      properties:
        observed_at: { type: string, format: date-time }
        condition: { type: string, enum: [ok, degraded] }
        severity: { type: string, enum: [none, info, watch, warning, critical] }
        summary: { type: string }
        checks:
          type: array
          items:
            type: object
            required: [name, condition]
            additionalProperties: true
            properties:
              name: { type: string }
              label: { type: string }
              condition: { type: string, enum: [ok, degraded, down] }
              severity: { type: string, enum: [none, info, watch, warning, critical] }
              summary: { type: string }

    MediaIntakeRequestV1:
      type: object
      required: [schemaVersion, eventId, idempotencyKey, source, artifact]
      additionalProperties: false
      properties:
        schemaVersion: { type: string, const: media2text.intake.v1 }
        eventId: { type: string }
        idempotencyKey: { type: string }
        correlationId: { type: string }
        source:
          type: object
          required: [authority, itemId, artifactRevision]
          additionalProperties: false
          properties:
            authority: { type: string }
            itemId: { type: string }
            collectionId: { type: string }
            artifactRevision: { type: string, pattern: "^sha256:[a-f0-9]{64}$" }
        artifact:
          type: object
          required: [url, sha256, bytes, contentType]
          additionalProperties: false
          properties:
            url: { type: string, format: uri }
            sha256: { type: string, pattern: "^[a-f0-9]{64}$" }
            bytes: { type: integer, minimum: 1 }
            contentType: { type: string, pattern: "^audio/" }
            durationSeconds: { type: number, exclusiveMinimum: 0 }
            filename: { type: string }
        title: { type: string }

    MediaIntakeRecord:
      type: object
      required: [intakeId, schemaVersion, eventId, idempotencyKey, source, artifact, status, attemptCount, createdAt, updatedAt]
      properties:
        intakeId: { type: string }
        schemaVersion: { type: string, const: media2text.intake.v1 }
        eventId: { type: string }
        idempotencyKey: { type: string }
        correlationId: { type: string }
        source: { type: object, additionalProperties: true }
        artifact:
          type: object
          description: Sanitized artifact metadata; the source URL is never returned.
          additionalProperties: true
        title: { type: string }
        status: { type: string, enum: [held, accepted, fetching, ready, running, completed, failed] }
        attemptCount: { type: integer }
        runId: { type: string }
        transcriptId: { type: string }
        transcriptRecordSha256: { type: string }
        error: { type: object, additionalProperties: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    MediaIntakeAcceptedResponse:
      type: object
      required: [intake, deduplicated, links]
      properties:
        intake: { $ref: "#/components/schemas/MediaIntakeRecord" }
        deduplicated: { type: boolean }
        links: { type: object, additionalProperties: { type: string } }

    MediaIntakeListResponse:
      type: object
      required: [schemaVersion, items]
      properties:
        schemaVersion: { type: string, const: media2text.intake-list.v1 }
        items:
          type: array
          items: { $ref: "#/components/schemas/MediaIntakeRecord" }

    TranscriptSourceV1:
      type: object
      required: [kind, authority, sourceItemId, title, artifactRevision]
      additionalProperties: false
      properties:
        kind: { type: string, enum: [youtube, upload, intake] }
        authority: { type: string }
        sourceItemId: { type: string }
        sourceCollectionId: { type: string }
        canonicalUrl: { type: string }
        title: { type: string }
        publishedAt: { type: string }
        artifactRevision: { type: string }

    TranscriptRecordV1:
      type: object
      required: [schemaVersion, transcriptId, createdAt, producer, correlation, source, artifact, transcription, representations]
      additionalProperties: false
      properties:
        schemaVersion: { type: string, const: media2text.transcript.v1 }
        transcriptId: { type: string }
        createdAt: { type: string, format: date-time }
        producer: { type: object, additionalProperties: true }
        correlation: { type: object, additionalProperties: true }
        source: { $ref: "#/components/schemas/TranscriptSourceV1" }
        artifact: { type: object, additionalProperties: true }
        transcription: { type: object, additionalProperties: true }
        representations:
          type: array
          items: { type: object, additionalProperties: true }
        recordSha256: { type: string }
        recordBytes: { type: integer }

    TranscriptSummary:
      type: object
      required: [transcriptId, createdAt, source, transcription, recordSha256, bytes, href]
      properties:
        transcriptId: { type: string }
        createdAt: { type: string, format: date-time }
        source: { $ref: "#/components/schemas/TranscriptSourceV1" }
        transcription: { type: object, additionalProperties: true }
        recordSha256: { type: string }
        bytes: { type: integer }
        href: { type: string }

    TranscriptListResponse:
      type: object
      required: [schemaVersion, items]
      properties:
        schemaVersion: { type: string, const: media2text.transcript-list.v1 }
        items:
          type: array
          items: { $ref: "#/components/schemas/TranscriptSummary" }

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        message:
          type: string

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }

    PipelineEvent:
      type: object
      description: |
        Best-effort schema for pipeline events (SSE and persisted events).
        This is intentionally loose because the event payload varies by `type`.
      required: [type]
      properties:
        type:
          type: string
          description: |
            Event type, e.g. `run:start`, `run:done`, `run:cancelled`, `run:error`,
            `video:start`, `video:stage`, `video:done`, `video:skip`, `video:error`.
      additionalProperties: true

    CleanupResponse:
      type: object
      required: [retention]
      properties:
        retention:
          type: object
          required: [nowIso, runs, audio]
          properties:
            nowIso: { type: string }
            runs:
              type: object
              required: [enabled, days, deleted, kept, errors]
              properties:
                enabled: { type: boolean }
                days: { type: integer }
                deleted: { type: integer }
                kept: { type: integer }
                errors: { type: integer }
            audio:
              type: object
              required: [enabled, days, deletedFiles, keptFiles, errors]
              properties:
                enabled: { type: boolean }
                days: { type: integer }
                deletedFiles: { type: integer }
                keptFiles: { type: integer }
                errors: { type: integer }

    ProviderCapability:
      type: object
      required: [id, maxAudioBytes, supportsDiarization]
      properties:
        id:
          type: string
          enum: [assemblyai, deepgram, openai_whisper]
        maxAudioBytes:
          type: integer
        supportsDiarization:
          type: boolean

    ProvidersListResponse:
      type: object
      required: [providers]
      properties:
        providers:
          type: array
          items:
            $ref: "#/components/schemas/ProviderCapability"

    UsageViolation:
      type: object
      required: [scope, limit, projected, unit]
      properties:
        scope:
          type: string
          enum: [item, run, source_24h, total_30d, usd_30d]
        limit: { type: number }
        projected: { type: number }
        unit:
          type: string
          enum: [minutes, usd]

    UsageEstimate:
      type: object
      required:
        [provider, knownItems, unknownItems, audioMinutes, estimatedUsd, complete, allowed, enforced, violations]
      properties:
        provider:
          type: string
          enum: [assemblyai, deepgram, openai_whisper]
        knownItems: { type: integer }
        unknownItems: { type: integer }
        audioMinutes: { type: number }
        estimatedUsd: { type: number }
        complete: { type: boolean }
        allowed:
          type: [boolean, "null"]
        enforced: { type: boolean }
        violations:
          type: array
          items: { $ref: "#/components/schemas/UsageViolation" }

    UsagePolicy:
      type: object
      required:
        [enforcement, maxItemMinutes, maxRunMinutes, maxSourceMinutes24h, maxTotalMinutes30d, maxTotalUsd30d, ratesUsdPerHour]
      properties:
        enforcement:
          type: string
          enum: [enforce, track]
        maxItemMinutes: { type: number }
        maxRunMinutes: { type: number }
        maxSourceMinutes24h: { type: number }
        maxTotalMinutes30d: { type: number }
        maxTotalUsd30d: { type: number }
        ratesUsdPerHour:
          type: object
          required: [assemblyai, deepgram, openai_whisper]
          properties:
            assemblyai: { type: number }
            deepgram: { type: number }
            openai_whisper: { type: number }

    UsageProviderSnapshot:
      type: object
      required: [provider, audioMinutes, estimatedUsd, reservations]
      properties:
        provider:
          type: string
          enum: [assemblyai, deepgram, openai_whisper]
        audioMinutes: { type: number }
        estimatedUsd: { type: number }
        reservations: { type: integer }

    UsagePeriodSnapshot:
      type: object
      required: [audioMinutes, estimatedUsd, reservations, byProvider]
      properties:
        audioMinutes: { type: number }
        estimatedUsd: { type: number }
        reservations: { type: integer }
        byProvider:
          type: array
          items: { $ref: "#/components/schemas/UsageProviderSnapshot" }

    UsageSnapshot:
      type: object
      required: [generatedAt, currency, policy, last24h, last30d, pendingReservations, failedReservations]
      properties:
        generatedAt: { type: string, format: date-time }
        currency:
          type: string
          enum: [USD]
        policy: { $ref: "#/components/schemas/UsagePolicy" }
        last24h: { $ref: "#/components/schemas/UsagePeriodSnapshot" }
        last30d: { $ref: "#/components/schemas/UsagePeriodSnapshot" }
        pendingReservations: { type: integer }
        failedReservations: { type: integer }

    UsageCostResponse:
      type: object
      required: [usage]
      properties:
        usage: { $ref: "#/components/schemas/UsageSnapshot" }

    NonSecretSettings:
      type: object
      description: |
        Persisted non-secret defaults. Secrets (API keys) are never stored here.
      properties:
        filenameStyle:
          type: string
          enum: [id, id_title, title_id]
        audioFormat:
          type: string
          enum: [mp3, wav]
        sttProvider:
          type: string
          enum: [assemblyai, deepgram, openai_whisper]
        deepgramModel:
          type: string
        deepgramDiarization:
          type: boolean
        openaiWhisperModel:
          type: string
        maxAudioMB:
          type: integer
        splitOverlapSeconds:
          type: integer
        languageDetection:
          type: string
          enum: [auto, manual]
        languageCode: { type: string }
        concurrency: { type: integer }
        maxNewVideos: { type: integer }
        afterDate: { type: string }
        csvEnabled: { type: boolean }
        commentsEnabled: { type: boolean }
        commentsMax: { type: integer }
        pollIntervalMs: { type: integer }
        maxPollMinutes: { type: integer }
        downloadRetries: { type: integer }
        transcriptionRetries: { type: integer }
        providerTimeoutMs: { type: integer }
        catalogMaxAgeHours: { type: integer }
      additionalProperties: false

    SettingsGetResponse:
      type: object
      required: [outputDir, settingsPath, settings, effective, sources]
      properties:
        outputDir: { type: string }
        settingsPath: { type: string }
        updatedAt: { type: string }
        settings:
          $ref: "#/components/schemas/NonSecretSettings"
        effective:
          $ref: "#/components/schemas/NonSecretSettings"
        sources:
          type: object
          additionalProperties: false
          properties:
            filenameStyle: { $ref: "#/components/schemas/NonSecretSettingSource" }
            audioFormat: { $ref: "#/components/schemas/NonSecretSettingSource" }
            sttProvider: { $ref: "#/components/schemas/NonSecretSettingSource" }
            deepgramModel: { $ref: "#/components/schemas/NonSecretSettingSource" }
            deepgramDiarization: { $ref: "#/components/schemas/NonSecretSettingSource" }
            openaiWhisperModel: { $ref: "#/components/schemas/NonSecretSettingSource" }
            maxAudioMB: { $ref: "#/components/schemas/NonSecretSettingSource" }
            splitOverlapSeconds: { $ref: "#/components/schemas/NonSecretSettingSource" }
            languageDetection: { $ref: "#/components/schemas/NonSecretSettingSource" }
            languageCode: { $ref: "#/components/schemas/NonSecretSettingSource" }
            concurrency: { $ref: "#/components/schemas/NonSecretSettingSource" }
            maxNewVideos: { $ref: "#/components/schemas/NonSecretSettingSource" }
            afterDate: { $ref: "#/components/schemas/NonSecretSettingSource" }
            csvEnabled: { $ref: "#/components/schemas/NonSecretSettingSource" }
            commentsEnabled: { $ref: "#/components/schemas/NonSecretSettingSource" }
            commentsMax: { $ref: "#/components/schemas/NonSecretSettingSource" }
            pollIntervalMs: { $ref: "#/components/schemas/NonSecretSettingSource" }
            maxPollMinutes: { $ref: "#/components/schemas/NonSecretSettingSource" }
            downloadRetries: { $ref: "#/components/schemas/NonSecretSettingSource" }
            transcriptionRetries: { $ref: "#/components/schemas/NonSecretSettingSource" }
            providerTimeoutMs: { $ref: "#/components/schemas/NonSecretSettingSource" }
            catalogMaxAgeHours: { $ref: "#/components/schemas/NonSecretSettingSource" }

    NonSecretSettingSource:
      type: string
      enum: [env, config.yaml, settingsFile, default, unset]

    SettingsPatchRequest:
      type: object
      required: [settings]
      properties:
        settings:
          type: object
          description: |
            Partial settings update. Send `null` to clear a key.
          additionalProperties: false
          properties:
            filenameStyle: { type: [string, "null"], enum: [id, id_title, title_id, null] }
            audioFormat: { type: [string, "null"], enum: [mp3, wav, null] }
            sttProvider: { type: [string, "null"], enum: [assemblyai, deepgram, openai_whisper, null] }
            deepgramModel: { type: [string, "null"] }
            deepgramDiarization: { type: [boolean, "null"] }
            openaiWhisperModel: { type: [string, "null"] }
            maxAudioMB: { type: [integer, "null"] }
            splitOverlapSeconds: { type: [integer, "null"] }
            languageDetection: { type: [string, "null"], enum: [auto, manual, null] }
            languageCode: { type: [string, "null"] }
            concurrency: { type: [integer, "null"] }
            maxNewVideos: { type: [integer, "null"] }
            afterDate: { type: [string, "null"] }
            csvEnabled: { type: [boolean, "null"] }
            commentsEnabled: { type: [boolean, "null"] }
            commentsMax: { type: [integer, "null"] }
            pollIntervalMs: { type: [integer, "null"] }
            maxPollMinutes: { type: [integer, "null"] }
            downloadRetries: { type: [integer, "null"] }
            transcriptionRetries: { type: [integer, "null"] }
            providerTimeoutMs: { type: [integer, "null"] }
            catalogMaxAgeHours: { type: [integer, "null"] }
      additionalProperties: false

    WatchlistEntry:
      type: object
      required: [id, channelUrl, enabled, createdAt]
      properties:
        id: { type: string }
        channelUrl: { type: string }
        channelId: { type: string }
        channelTitle: { type: string }
        intervalMinutes: { type: integer }
        enabled: { type: boolean }
        lastCheckedAt: { type: string }
        lastRunId: { type: string }
        createdAt: { type: string }

    WatchlistCreateRequest:
      type: object
      required: [channelUrl]
      properties:
        channelUrl:
          type: string
          description: YouTube channel or playlist URL (watchlist is for recurring sources, not single videos).
        intervalMinutes: { type: [integer, "null"] }
        enabled: { type: boolean }

    WatchlistUpdateRequest:
      type: object
      properties:
        intervalMinutes:
          description: Optional. Set to null to clear override and use the scheduler global default.
          type: [integer, "null"]
        enabled: { type: boolean }

    WatchlistEntryResponse:
      type: object
      required: [entry]
      properties:
        entry:
          $ref: "#/components/schemas/WatchlistEntry"

    WatchlistListResponse:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/WatchlistEntry"

    SchedulerStatus:
      type: object
      required: [enabled, running, intervalMinutes, maxConcurrentRuns]
      properties:
        enabled: { type: boolean }
        running: { type: boolean }
        intervalMinutes: { type: integer }
        maxConcurrentRuns: { type: integer }
        lastTickAt: { type: string }
        nextTickAt: { type: string }

    SchedulerStatusResponse:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/SchedulerStatus"

    SchedulerTriggerResponse:
      type: object
      required: [result, status]
      properties:
        result:
          type: object
          required: [checked, runsCreated]
          properties:
            checked: { type: integer }
            runsCreated: { type: integer }
        status:
          $ref: "#/components/schemas/SchedulerStatus"

    HealthResponse:
      type: object
      required: [ok, service]
      properties:
        ok:
          type: boolean
        service:
          type: string
        version:
          type: string
        deps:
          type: object
          properties:
            ytDlp:
              type: object
              required: [ok]
              properties:
                ok: { type: boolean }
                version: { type: string }
                error: { type: string }
            ffmpeg:
              type: object
              required: [ok]
              properties:
                ok: { type: boolean }
                error: { type: string }
            disk:
              type: object
              required: [ok]
              properties:
                ok: { type: boolean }
                freeBytes: { type: number }
                freeGb: { type: number }
                error: { type: string }
            persist:
              type: object
              required: [ok, dir, writable]
              properties:
                ok: { type: boolean }
                dir: { type: string }
                writable: { type: boolean }
                error: { type: string }

    RunStatus:
      type: string
      enum: [queued, running, done, error, cancelled]

    RunStats:
      type: object
      required: [succeeded, failed, skipped, total]
      properties:
        succeeded: { type: integer }
        failed: { type: integer }
        skipped: { type: integer }
        total: { type: integer }

    RunRecord:
      type: object
      required: [runId, status, inputUrl, force, createdAt]
      properties:
        runId: { type: string, format: uuid }
        status: { $ref: "#/components/schemas/RunStatus" }
        inputUrl: { type: string }
        force: { type: boolean }
        createdAt: { type: string }
        startedAt: { type: string }
        finishedAt: { type: string }
        cancelRequested: { type: boolean }
        error: { type: string }
        callbackUrl: { type: string }
        channelId: { type: string }
        channelTitle: { type: string }
        channelDirName: { type: string }
        previewVideoId: { type: string }
        previewTitle: { type: string }
        stats: { $ref: "#/components/schemas/RunStats" }
        videoResults:
          type: array
          description: Per-video outcome populated as the pipeline processes each video.
          items:
            $ref: "#/components/schemas/VideoResult"

    RunsResponse:
      type: object
      required: [runs]
      properties:
        runs:
          type: array
          items: { $ref: "#/components/schemas/RunRecord" }

    RunGetResponse:
      type: object
      required: [run]
      properties:
        run: { $ref: "#/components/schemas/RunRecord" }

    RunCreateRequest:
      type: object
      properties:
        url: { type: string }
        audioId:
          type: string
          description: Audio ID returned by `POST /audio`.
        force: { type: [boolean, "null"] }
        maxNewVideos:
          type: [integer, "null"]
          description: |
            Limit this run to at most N NEW (unprocessed) videos.
            Applied AFTER skipping already-processed videos so repeated runs can backfill incrementally.
        afterDate:
          type: [string, "null"]
          description: Only include videos after YYYY-MM-DD (best-effort; based on yt-dlp upload_date).
        beforeDate:
          type: [string, "null"]
          description: Only include videos before YYYY-MM-DD (best-effort; based on yt-dlp upload_date). Must be >= afterDate.
        videoIds:
          type: array
          items:
            type: string
            pattern: "^[A-Za-z0-9_-]{1,64}$"
          maxItems: 5000
          description: |
            Process exactly these video IDs. When set, date filters and processedIndex are
            ignored — the external orchestrator (Cortex) is the source of truth for what
            needs processing.
        callbackUrl:
          type: [string, "null"]
          description: |
            Optional. If set, the API sends a POST webhook when the run ends:
            - `run:done` when status becomes done
            - `run:error` when status becomes error
            - `run:cancelled` when status becomes cancelled
            If `Y2T_WEBHOOK_SECRET` is set on the server, requests include:
            - `X-Y2T-Timestamp` (ISO)
            - `X-Y2T-Signature` (HMAC-SHA256 of `${timestamp}.${body}`)
        config:
          type: object
          additionalProperties: true
      oneOf:
        - required: [url]
        - required: [audioId]

    RunPlanRequest:
      type: object
      required: [url]
      properties:
        url: { type: string }
        force: { type: [boolean, "null"] }
        maxNewVideos:
          type: [integer, "null"]
          description: |
            Limit this run to at most N NEW (unprocessed) videos.
            Applied AFTER skipping already-processed videos so repeated runs can backfill incrementally.
        afterDate:
          type: [string, "null"]
          description: Only include videos after YYYY-MM-DD (best-effort; based on yt-dlp upload_date).
        beforeDate:
          type: [string, "null"]
          description: Only include videos before YYYY-MM-DD (best-effort; based on yt-dlp upload_date). Must be >= afterDate.
        videoIds:
          type: array
          items:
            type: string
            pattern: "^[A-Za-z0-9_-]{1,64}$"
          maxItems: 5000
          description: |
            Plan for exactly these video IDs. When set, date filters and processedIndex are
            ignored — the external orchestrator (Cortex) is the source of truth.
        config:
          type: object
          additionalProperties: true

    AudioUploadMeta:
      type: object
      required: [audioId, title, originalFilename, bytes, ext, createdAt]
      properties:
        audioId: { type: string }
        title: { type: string }
        originalFilename: { type: string }
        contentType: { type: string }
        bytes: { type: integer }
        ext: { type: string }
        createdAt: { type: string }

    AudioUploadResponse:
      type: object
      required: [audio]
      properties:
        audio:
          $ref: "#/components/schemas/AudioUploadMeta"

    RunCreateLinks:
      type: object
      required: [run, events, artifacts, cancel]
      properties:
        run: { type: string }
        events: { type: string }
        artifacts: { type: string }
        cancel: { type: string }

    RunCreateResponse:
      type: object
      required: [run, links]
      properties:
        run: { $ref: "#/components/schemas/RunRecord" }
        links: { $ref: "#/components/schemas/RunCreateLinks" }

    PlannedVideo:
      type: object
      required: [id, title, url, basename, processed]
      properties:
        id: { type: string }
        title: { type: string }
        url: { type: string }
        uploadDate: { type: string }
        durationSeconds: { type: number }
        basename: { type: string }
        processed: { type: boolean }

    RunPlan:
      type: object
      required:
        [
          inputUrl,
          force,
          channelId,
          totalVideos,
          alreadyProcessed,
          unprocessed,
          toProcess,
          filters,
          videos,
          selectedVideos
        ]
      properties:
        inputUrl: { type: string }
        force: { type: boolean }
        channelId: { type: string }
        channelTitle: { type: string }
        totalVideos: { type: integer }
        alreadyProcessed: { type: integer }
        unprocessed:
          type: integer
          description: Total unprocessed videos under the given filters (may be larger than `toProcess` when `maxNewVideos` is set).
        toProcess: { type: integer }
        filters:
          type: object
          required: []
          properties:
            afterDate: { type: string }
            beforeDate: { type: string }
            maxNewVideos: { type: integer }
            videoIds:
              type: array
              items: { type: string }
        videos:
          type: array
          items: { $ref: "#/components/schemas/PlannedVideo" }
        selectedVideos:
          type: array
          description: Videos selected to be processed for this run (unprocessed + capped by `maxNewVideos`).
          items: { $ref: "#/components/schemas/PlannedVideo" }
        usageEstimate:
          $ref: "#/components/schemas/UsageEstimate"

    RunPlanResponse:
      type: object
      required: [plan]
      properties:
        plan: { $ref: "#/components/schemas/RunPlan" }

    ChannelInfo:
      type: object
      required: [channelId, channelDirName]
      properties:
        channelId: { type: string }
        channelTitle: { type: string }
        channelDirName: { type: string }
        channelThumbnailUrl: { type: string }
        metaPath: { type: string }

    ChannelsResponse:
      type: object
      required: [channels]
      properties:
        channels:
          type: array
          items: { $ref: "#/components/schemas/ChannelInfo" }

    ChannelMeta:
      type: object
      required: [channelId, channelTitle, channelUrl]
      properties:
        channelId: { type: string }
        channelTitle: { type: string }
        channelUrl: { type: string }
        retrievedAt: { type: string }

    ChannelMetaResponse:
      type: object
      required: [channelDirName, meta]
      properties:
        channelDirName: { type: string }
        meta: { $ref: "#/components/schemas/ChannelMeta" }

    OutputPaths:
      type: object
      required:
        [
          jsonPath,
          txtPath,
          mdPath,
          jsonlPath,
          csvPath,
          commentsPath,
          metaPath,
          channelMetaPath,
          errorLogPath,
          audioPath
        ]
      properties:
        jsonPath: { type: string }
        txtPath: { type: string }
        mdPath: { type: string }
        jsonlPath: { type: string }
        csvPath: { type: string }
        commentsPath: { type: string }
        metaPath: { type: string }
        channelMetaPath: { type: string }
        errorLogPath: { type: string }
        audioPath: { type: string }

    VideoMeta:
      type: object
      required: [videoId, title, url, channelId, filenameStyle, audioFormat, createdAt]
      properties:
        videoId: { type: string }
        title: { type: string }
        url: { type: string }
        uploadDate: { type: string }
        description: { type: string }
        channelId: { type: string }
        channelTitle: { type: string }
        source:
          type: string
          enum: [youtube, upload]
        audioId: { type: string }
        originalFilename: { type: string }
        filenameStyle:
          type: string
          enum: [id, id_title, title_id]
        audioFormat: { type: string }
        languageCode: { type: string }
        languageDetection: { type: boolean }
        languageConfidence: { type: number }
        createdAt: { type: string }

    VideoInfo:
      type: object
      required: [videoId, basename, paths]
      properties:
        videoId: { type: string }
        title: { type: string }
        basename: { type: string }
        metaPath: { type: string }
        paths: { $ref: "#/components/schemas/OutputPaths" }
        meta: { $ref: "#/components/schemas/VideoMeta" }

    VideosResponse:
      type: object
      required: [channelDirName, videos]
      properties:
        channelDirName: { type: string }
        videos:
          type: array
          items: { $ref: "#/components/schemas/VideoInfo" }

    DeleteChannelResponse:
      type: object
      required: [ok, deleted]
      properties:
        ok: { type: boolean }
        deleted:
          type: object
          required: [outputFiles, audioRemoved, catalogCacheRemoved]
          properties:
            outputFiles: { type: integer }
            audioRemoved: { type: boolean }
            catalogCacheRemoved: { type: boolean }

    DeleteVideoResponse:
      type: object
      required: [ok, deleted]
      properties:
        ok: { type: boolean }
        deleted:
          type: object
          required: [outputFiles, audioFiles]
          properties:
            outputFiles: { type: integer }
            audioFiles: { type: integer }

    ArtifactKind:
      type: string
      enum: [txt, md, json, jsonl, meta, comments, csv, audio]

    RunArtifacts:
      type: object
      required: [videos]
      properties:
        channelDirName: { type: string }
        channelId: { type: string }
        channelTitle: { type: string }
        videos:
          type: array
          items: { $ref: "#/components/schemas/VideoInfo" }

    RunArtifactsResponse:
      type: object
      required: [run, artifacts]
      properties:
        run: { $ref: "#/components/schemas/RunRecord" }
        artifacts: { $ref: "#/components/schemas/RunArtifacts" }

    VideoResult:
      type: object
      required: [videoId, basename, status]
      properties:
        videoId: { type: string }
        basename: { type: string }
        status:
          type: string
          enum: [done, error, skipped]
        transcriptId:
          type: string
          description: Immutable Transcript Store identity for completed items.
        transcriptRecordSha256:
          type: string
          description: SHA-256 of the canonical immutable transcript record bytes.

    CatalogVideo:
      type: object
      required: [id, title, url]
      properties:
        id: { type: string }
        title: { type: string }
        url: { type: string }
        uploadDate: { type: string }
        durationSeconds: { type: number }
        description: { type: string }

    CatalogSummary:
      type: object
      required: [channelId, inputUrl, retrievedAt, videoCount]
      properties:
        channelId: { type: string }
        channelTitle: { type: string }
        inputUrl: { type: string }
        retrievedAt: { type: string }
        videoCount: { type: integer }

    CatalogDetail:
      type: object
      required: [channelId, inputUrl, retrievedAt, complete, videos]
      properties:
        channelId: { type: string }
        channelTitle: { type: string }
        inputUrl: { type: string }
        retrievedAt: { type: string }
        complete: { type: boolean }
        videos:
          type: array
          items: { $ref: "#/components/schemas/CatalogVideo" }

    CatalogListResponse:
      type: object
      required: [catalogs]
      properties:
        catalogs:
          type: array
          items: { $ref: "#/components/schemas/CatalogSummary" }

    CatalogDetailResponse:
      type: object
      required: [catalog]
      properties:
        catalog: { $ref: "#/components/schemas/CatalogDetail" }
