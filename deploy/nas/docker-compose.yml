services:
  youtube2text-api:
    image: registry.lamanoriega.com/youtube2text-api:${Y2T_IMAGE_TAG:?Y2T_IMAGE_TAG is required}
    network_mode: host
    container_name: youtube2text-api
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      OUTPUT_DIR: /data/output
      AUDIO_DIR: /data/audio
      Y2T_API_PERSIST_RUNS: "true"
      Y2T_API_PERSIST_DIR: /data/output/_runs
      Y2T_API_KEY: ${Y2T_API_KEY}
      Y2T_ALLOW_INSECURE_NO_API_KEY: "false"
      Y2T_CORS_ORIGINS: ${Y2T_CORS_ORIGINS:-https://y2t.lamanoriega.com}
      Y2T_TRUST_PROXY: "false"
      Y2T_MAX_BODY_BYTES: ${Y2T_MAX_BODY_BYTES:-1000000}
      Y2T_MAX_UPLOAD_MB: ${Y2T_MAX_UPLOAD_MB:-1024}
      Y2T_UPLOAD_TIMEOUT_MS: ${Y2T_UPLOAD_TIMEOUT_MS:-120000}
      Y2T_EXEC_MAX_BYTES: ${Y2T_EXEC_MAX_BYTES:-52428800}
      Y2T_API_KEY_MAX_BYTES: ${Y2T_API_KEY_MAX_BYTES:-256}
      Y2T_API_KEY_MIN_BYTES: ${Y2T_API_KEY_MIN_BYTES:-32}
      Y2T_AUTH_FAIL_MAX: ${Y2T_AUTH_FAIL_MAX:-30}
      Y2T_AUTH_FAIL_WINDOW_MS: ${Y2T_AUTH_FAIL_WINDOW_MS:-60000}
      Y2T_RATE_LIMIT_WRITE_MAX: ${Y2T_RATE_LIMIT_WRITE_MAX:-60}
      Y2T_RATE_LIMIT_WINDOW_MS: ${Y2T_RATE_LIMIT_WINDOW_MS:-60000}
      Y2T_RATE_LIMIT_READ_MAX: ${Y2T_RATE_LIMIT_READ_MAX:-300}
      Y2T_RATE_LIMIT_READ_WINDOW_MS: ${Y2T_RATE_LIMIT_READ_WINDOW_MS:-60000}
      Y2T_RATE_LIMIT_HEALTH_MAX: ${Y2T_RATE_LIMIT_HEALTH_MAX:-30}
      Y2T_RATE_LIMIT_HEALTH_WINDOW_MS: ${Y2T_RATE_LIMIT_HEALTH_WINDOW_MS:-60000}
      Y2T_SSE_MAX_CLIENTS: ${Y2T_SSE_MAX_CLIENTS:-1000}
      Y2T_SSE_MAX_CLIENTS_PER_IP: ${Y2T_SSE_MAX_CLIENTS_PER_IP:-50}
      Y2T_SSE_MAX_LIFETIME_SECONDS: ${Y2T_SSE_MAX_LIFETIME_SECONDS:-0}
      Y2T_MAX_BUFFERED_EVENTS_PER_RUN: ${Y2T_MAX_BUFFERED_EVENTS_PER_RUN:-5000}
      Y2T_MAX_EVENT_BYTES: ${Y2T_MAX_EVENT_BYTES:-65536}
      Y2T_REQUEST_TIMEOUT_MS: ${Y2T_REQUEST_TIMEOUT_MS:-30000}
      Y2T_RUN_TIMEOUT_MINUTES: ${Y2T_RUN_TIMEOUT_MINUTES:-240}
      Y2T_SHUTDOWN_TIMEOUT_SECONDS: ${Y2T_SHUTDOWN_TIMEOUT_SECONDS:-60}
      Y2T_RETENTION_RUNS_DAYS: ${Y2T_RETENTION_RUNS_DAYS:-30}
      Y2T_RETENTION_AUDIO_DAYS: ${Y2T_RETENTION_AUDIO_DAYS:-7}
      Y2T_MAX_CONCURRENT_RUNS_PER_KEY: ${Y2T_MAX_CONCURRENT_RUNS_PER_KEY:-0}
      Y2T_SCHEDULER_ENABLED: "false"
      Y2T_SCHEDULER_INTERVAL_MINUTES: ${Y2T_SCHEDULER_INTERVAL_MINUTES:-60}
      Y2T_SCHEDULER_MAX_CONCURRENT_RUNS: ${Y2T_SCHEDULER_MAX_CONCURRENT_RUNS:-1}
      Y2T_WATCHLIST_ALLOW_ANY_URL: "false"
      Y2T_RUN_ALLOW_ANY_URL: "false"
      Y2T_USAGE_ENFORCEMENT: ${Y2T_USAGE_ENFORCEMENT:-enforce}
      Y2T_USAGE_MAX_ITEM_MINUTES: ${Y2T_USAGE_MAX_ITEM_MINUTES:-180}
      Y2T_USAGE_MAX_RUN_MINUTES: ${Y2T_USAGE_MAX_RUN_MINUTES:-300}
      Y2T_USAGE_MAX_SOURCE_MINUTES_24H: ${Y2T_USAGE_MAX_SOURCE_MINUTES_24H:-600}
      Y2T_USAGE_MAX_TOTAL_MINUTES_30D: ${Y2T_USAGE_MAX_TOTAL_MINUTES_30D:-3000}
      Y2T_USAGE_MAX_TOTAL_USD_30D: ${Y2T_USAGE_MAX_TOTAL_USD_30D:-25}
      Y2T_USAGE_RATE_ASSEMBLYAI_USD_PER_HOUR: ${Y2T_USAGE_RATE_ASSEMBLYAI_USD_PER_HOUR:-0.23}
      Y2T_USAGE_RATE_DEEPGRAM_USD_PER_HOUR: ${Y2T_USAGE_RATE_DEEPGRAM_USD_PER_HOUR:-0.552}
      Y2T_USAGE_RATE_OPENAI_WHISPER_USD_PER_HOUR: ${Y2T_USAGE_RATE_OPENAI_WHISPER_USD_PER_HOUR:-0.36}
      Y2T_WEBHOOK_ALLOWED_DOMAINS: ${Y2T_WEBHOOK_ALLOWED_DOMAINS:-}
      Y2T_WEBHOOK_SECRET: ${Y2T_WEBHOOK_SECRET:-}
      Y2T_WEBHOOK_RETRIES: ${Y2T_WEBHOOK_RETRIES:-3}
      Y2T_WEBHOOK_TIMEOUT_MS: ${Y2T_WEBHOOK_TIMEOUT_MS:-5000}
      Y2T_WEBHOOK_MAX_AGE_SECONDS: ${Y2T_WEBHOOK_MAX_AGE_SECONDS:-}
      Y2T_INTAKE_API_KEY: ${Y2T_INTAKE_API_KEY:-}
      Y2T_INTAKE_ARTIFACT_ALLOWED_ORIGINS: ${Y2T_INTAKE_ARTIFACT_ALLOWED_ORIGINS:-}
      Y2T_INTAKE_WORKER_ENABLED: ${Y2T_INTAKE_WORKER_ENABLED:-true}
      Y2T_INTAKE_WORKER_INTERVAL_MS: ${Y2T_INTAKE_WORKER_INTERVAL_MS:-1000}
      Y2T_INTAKE_LEASE_MS: ${Y2T_INTAKE_LEASE_MS:-300000}
      Y2T_INTAKE_FETCH_ATTEMPTS: ${Y2T_INTAKE_FETCH_ATTEMPTS:-5}
      Y2T_INTAKE_FETCH_TIMEOUT_MS: ${Y2T_INTAKE_FETCH_TIMEOUT_MS:-120000}
      Y2T_INTAKE_MAX_ARTIFACT_MB: ${Y2T_INTAKE_MAX_ARTIFACT_MB:-2048}
      Y2T_INTAKE_TERMINAL_RETENTION_DAYS: ${Y2T_INTAKE_TERMINAL_RETENTION_DAYS:-365}
      Y2T_TRANSCRIPTION_INTAKE_PROFILES_JSON: ${Y2T_TRANSCRIPTION_INTAKE_PROFILES_JSON:-[]}
      Y2T_INTAKE_STATUS_OUTBOX_ENABLED: ${Y2T_INTAKE_STATUS_OUTBOX_ENABLED:-true}
      Y2T_INTAKE_STATUS_OUTBOX_INTERVAL_MS: ${Y2T_INTAKE_STATUS_OUTBOX_INTERVAL_MS:-1000}
      Y2T_INTAKE_STATUS_OUTBOX_MAX_ATTEMPTS: ${Y2T_INTAKE_STATUS_OUTBOX_MAX_ATTEMPTS:-20}
      Y2T_INTAKE_STATUS_OUTBOX_TIMEOUT_MS: ${Y2T_INTAKE_STATUS_OUTBOX_TIMEOUT_MS:-10000}
      Y2T_TRANSCRIPT_READY_URL: ${Y2T_TRANSCRIPT_READY_URL:-}
      Y2T_TRANSCRIPT_READY_SECRET: ${Y2T_TRANSCRIPT_READY_SECRET:-}
      Y2T_TRANSCRIPT_READY_KEY_ID: ${Y2T_TRANSCRIPT_READY_KEY_ID:-}
      Y2T_CORTEX_TRANSCRIPT_READ_KEY: ${Y2T_CORTEX_TRANSCRIPT_READ_KEY:-}
      Y2T_OUTBOX_INTERVAL_MS: ${Y2T_OUTBOX_INTERVAL_MS:-1000}
      Y2T_OUTBOX_MAX_ATTEMPTS: ${Y2T_OUTBOX_MAX_ATTEMPTS:-20}
      Y2T_OUTBOX_TIMEOUT_MS: ${Y2T_OUTBOX_TIMEOUT_MS:-10000}
      Y2T_OUTBOX_TERMINAL_RETENTION_DAYS: ${Y2T_OUTBOX_TERMINAL_RETENTION_DAYS:-365}
      Y2T_STT_PROVIDER: ${Y2T_STT_PROVIDER:-deepgram}
      Y2T_OPENAI_WHISPER_MODEL: ${Y2T_OPENAI_WHISPER_MODEL:-whisper-1}
      Y2T_DEEPGRAM_MODEL: ${Y2T_DEEPGRAM_MODEL:-nova-3}
      Y2T_DEEPGRAM_DIARIZATION: ${Y2T_DEEPGRAM_DIARIZATION:-true}
      Y2T_MAX_AUDIO_MB: ${Y2T_MAX_AUDIO_MB:-}
      Y2T_SPLIT_OVERLAP_SECONDS: ${Y2T_SPLIT_OVERLAP_SECONDS:-2}
      Y2T_POLL_INTERVAL_MS: ${Y2T_POLL_INTERVAL_MS:-5000}
      Y2T_MAX_POLL_MINUTES: ${Y2T_MAX_POLL_MINUTES:-60}
      Y2T_DOWNLOAD_RETRIES: ${Y2T_DOWNLOAD_RETRIES:-2}
      Y2T_TRANSCRIPTION_RETRIES: ${Y2T_TRANSCRIPTION_RETRIES:-2}
      Y2T_PROVIDER_TIMEOUT_MS: ${Y2T_PROVIDER_TIMEOUT_MS:-120000}
      Y2T_CATALOG_MAX_AGE_HOURS: ${Y2T_CATALOG_MAX_AGE_HOURS:-168}
      Y2T_HEALTH_DEEP_PUBLIC: "false"
      Y2T_HEALTH_INCLUDE_PATHS: "false"
      ASSEMBLYAI_API_KEY: ${ASSEMBLYAI_API_KEY:-}
      Y2T_ASSEMBLYAI_API_KEYS: ${Y2T_ASSEMBLYAI_API_KEYS:-}
      Y2T_ASSEMBLYAI_KEY_FAILURES: ${Y2T_ASSEMBLYAI_KEY_FAILURES:-2}
      Y2T_ASSEMBLYAI_KEY_COOLDOWN_MS: ${Y2T_ASSEMBLYAI_KEY_COOLDOWN_MS:-60000}
      ASSEMBLYAI_CREDITS_CHECK: ${ASSEMBLYAI_CREDITS_CHECK:-warn}
      ASSEMBLYAI_MIN_BALANCE_MINUTES: ${ASSEMBLYAI_MIN_BALANCE_MINUTES:-60}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      Y2T_DEEPGRAM_API_KEYS: ${Y2T_DEEPGRAM_API_KEYS:-}
      Y2T_DEEPGRAM_KEY_FAILURES: ${Y2T_DEEPGRAM_KEY_FAILURES:-2}
      Y2T_DEEPGRAM_KEY_COOLDOWN_MS: ${Y2T_DEEPGRAM_KEY_COOLDOWN_MS:-60000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      Y2T_OPENAI_API_KEY: ${Y2T_OPENAI_API_KEY:-}
      COMMENTS_ENABLED: ${COMMENTS_ENABLED:-true}
      COMMENTS_MAX: ${COMMENTS_MAX:-200}
      FILENAME_STYLE: ${FILENAME_STYLE:-title_id}
      YT_DLP_PATH: yt-dlp
    volumes:
      - ./data/output:/data/output
      - ./data/audio:/data/audio
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  youtube2text-web:
    image: registry.lamanoriega.com/youtube2text-web:${Y2T_IMAGE_TAG:?Y2T_IMAGE_TAG is required}
    network_mode: host
    container_name: youtube2text-web
    restart: unless-stopped
    depends_on:
      youtube2text-api:
        condition: service_healthy
    environment:
      Y2T_API_BASE_URL: http://127.0.0.1:8787
      Y2T_API_KEY: ${Y2T_API_KEY}
      Y2T_WEB_AUTH_SECRET: ${Y2T_WEB_AUTH_SECRET}
      Y2T_WEB_AUTH_PASSPHRASE: ${Y2T_WEB_AUTH_PASSPHRASE}
      Y2T_WEB_AUTH_SESSION_HOURS: ${Y2T_WEB_AUTH_SESSION_HOURS:-12}
      NEXT_PUBLIC_Y2T_API_BASE_URL: https://y2t.lamanoriega.com
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
